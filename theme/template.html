<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITLE_PLACEHOLDER — Sophia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Fraunces:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0d1117;
            --bg2:       #161b22;
            --bg3:       #1c2128;
            --fg:        #e6edf3;
            --fg2:       #adbac7;
            --accent:    #58a6ff;
            --accent2:   #3fb950;
            --yellow:    #d29922;
            --red:       #f85149;
            --border:    #30363d;
            --border2:   #21262d;
            --sidebar:   280px;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-disp: 'Fraunces', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font-body);
            font-size: 15px;
            line-height: 1.7;
            min-height: 100vh;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ── topbar ── */
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 52px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .hamburger {
            background: none;
            border: none;
            color: var(--fg2);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 8px;
            display: none;
        }

        .site-name {
            font-family: var(--font-disp);
            font-size: 1.1rem;
            color: var(--fg);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .site-name span { color: var(--accent); }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-trigger {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--fg2);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            padding: 5px 12px;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.5px;
        }

        .search-trigger:hover {
            border-color: var(--accent);
            color: var(--fg);
        }

        .kbd {
            background: var(--border);
            padding: 1px 5px;
            font-size: 0.65rem;
            color: var(--fg2);
            border-radius: 3px;
        }

        /* ── layout ── */
        .layout {
            display: flex;
            padding-top: 52px;
            min-height: 100vh;
        }

        /* ── sidebar ── */
        .sidebar {
            width: var(--sidebar);
            flex-shrink: 0;
            position: fixed;
            top: 52px;
            left: 0;
            bottom: 0;
            overflow-y: auto;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            padding: 20px 0;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); }

        .nav-subject {
            margin-bottom: 4px;
        }

        .nav-subject-name {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--fg2);
            padding: 8px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: color 0.15s;
            user-select: none;
        }

        .nav-subject-name:hover { color: var(--fg); }

        .nav-subject.active .nav-subject-name {
            color: var(--accent);
        }

        .nav-pages {
            display: flex;
            flex-direction: column;
        }

        .nav-pages.collapsed { display: none; }

        .nav-subject.active .nav-pages { display: flex; }

        .nav-page {
            font-size: 0.82rem;
            color: var(--fg2);
            padding: 5px 20px 5px 32px;
            transition: all 0.1s;
            border-left: 2px solid transparent;
            text-decoration: none;
            display: block;
        }

        .nav-page:hover {
            color: var(--fg);
            background: var(--bg3);
            text-decoration: none;
        }

        .nav-page.current {
            color: var(--accent);
            border-left-color: var(--accent);
            background: rgba(88,166,255,0.06);
        }

        /* ── main content ── */
        .main {
            margin-left: var(--sidebar);
            flex: 1;
            min-width: 0;
        }

        /* ── breadcrumb ── */
        .breadcrumb {
            padding: 12px 48px;
            border-bottom: 1px solid var(--border2);
            font-size: 0.75rem;
            color: var(--fg2);
            font-family: var(--font-mono);
            letter-spacing: 0.5px;
        }

        .breadcrumb a { color: var(--fg2); }
        .breadcrumb a:hover { color: var(--accent); text-decoration: none; }
        .breadcrumb span { color: var(--fg); }

        /* ── article ── */
        .article {
            max-width: 780px;
            padding: 48px 48px 80px;
        }

        /* ── content typography ── */
        .article h1 {
            font-family: var(--font-disp);
            font-size: 2.2rem;
            color: var(--fg);
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.2;
            letter-spacing: -0.3px;
        }

        .article h2 {
            font-family: var(--font-disp);
            font-size: 1.5rem;
            color: var(--fg);
            font-weight: 600;
            margin: 40px 0 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border2);
        }

        .article h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--fg);
            margin: 28px 0 12px;
        }

        .article h4 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent2);
            margin: 20px 0 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .article p {
            color: var(--fg2);
            margin-bottom: 16px;
            font-size: 15px;
            line-height: 1.8;
        }

        .article strong { color: var(--fg); font-weight: 600; }
        .article em { color: var(--fg); font-style: italic; }

        .article a {
            color: var(--accent);
            border-bottom: 1px solid rgba(88,166,255,0.3);
            text-decoration: none;
        }

        .article a:hover {
            border-bottom-color: var(--accent);
            text-decoration: none;
        }

        /* ── code ── */
        .article code {
            font-family: var(--font-mono);
            font-size: 0.85em;
            background: var(--bg3);
            color: #ff7b72;
            padding: 2px 6px;
            border: 1px solid var(--border2);
            border-radius: 3px;
        }

        .article pre {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            padding: 20px 24px;
            overflow-x: auto;
            margin: 20px 0;
            border-radius: 0 4px 4px 0;
        }

        .article pre code {
            background: none;
            border: none;
            padding: 0;
            color: var(--fg);
            font-size: 0.88rem;
            line-height: 1.7;
        }

        /* ── lists ── */
        .article ul, .article ol {
            padding-left: 24px;
            margin-bottom: 16px;
        }

        .article li {
            color: var(--fg2);
            margin-bottom: 6px;
            line-height: 1.7;
        }

        .article li strong { color: var(--fg); }

        /* ── blockquote ── */
        .article blockquote {
            border-left: 3px solid var(--yellow);
            padding: 12px 20px;
            margin: 20px 0;
            background: rgba(210,153,34,0.05);
        }

        .article blockquote p {
            color: var(--fg2);
            margin: 0;
            font-style: italic;
        }

        /* ── table ── */
        .article table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.88rem;
        }

        .article th {
            background: var(--bg3);
            color: var(--fg);
            font-weight: 600;
            padding: 10px 16px;
            text-align: left;
            border: 1px solid var(--border);
            font-size: 0.78rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .article td {
            padding: 9px 16px;
            border: 1px solid var(--border2);
            color: var(--fg2);
            vertical-align: top;
        }

        .article tr:hover td { background: var(--bg3); }

        /* ── hr ── */
        .article hr {
            border: none;
            border-top: 1px solid var(--border2);
            margin: 32px 0;
        }

        /* ── images ── */
        .article img {
            max-width: 100%;
            border: 1px solid var(--border);
            margin: 16px 0;
        }

        /* ── homepage ── */
        .homepage {
            padding: 48px;
            max-width: 900px;
        }

        .home-eyebrow {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--accent2);
            letter-spacing: 3px;
            margin-bottom: 12px;
        }

        .home-title {
            font-family: var(--font-disp);
            font-size: 3.5rem;
            color: var(--fg);
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .home-sub {
            color: var(--fg2);
            font-size: 1rem;
            margin-bottom: 56px;
            line-height: 1.6;
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .subject-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            padding: 20px;
            text-decoration: none;
            transition: all 0.15s;
            display: block;
        }

        .subject-card:hover {
            border-color: var(--accent);
            background: var(--bg3);
            transform: translateY(-2px);
            text-decoration: none;
        }

        .card-name {
            font-weight: 600;
            color: var(--fg);
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .card-count {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--fg2);
            letter-spacing: 1px;
        }

        /* ── search modal ── */
        .search-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
        }

        .search-overlay.open { display: block; }

        .search-modal {
            display: none;
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background: var(--bg2);
            border: 1px solid var(--accent);
            z-index: 201;
            max-height: 70vh;
            flex-direction: column;
            box-shadow: 0 16px 40px rgba(0,0,0,0.4);
        }

        .search-modal.open { display: flex; }

        .search-input-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .search-icon-modal { color: var(--fg2); font-size: 0.9rem; }

        .search-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--fg);
            font-family: var(--font-mono);
            font-size: 0.9rem;
        }

        .search-input::placeholder { color: var(--fg2); }

        .search-close-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--fg2);
            font-family: var(--font-mono);
            font-size: 0.68rem;
            padding: 2px 8px;
            cursor: pointer;
        }

        .search-results { overflow-y: auto; max-height: calc(70vh - 60px); }

        .search-result {
            display: block;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border2);
            text-decoration: none;
            transition: background 0.1s;
        }

        .search-result:hover, .search-result.selected {
            background: var(--bg3);
            text-decoration: none;
        }

        .sr-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 3px;
        }

        .sr-title {
            font-size: 0.9rem;
            color: var(--fg);
            font-weight: 500;
        }

        .sr-subject {
            font-family: var(--font-mono);
            font-size: 0.62rem;
            color: var(--accent2);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sr-snippet {
            font-size: 0.78rem;
            color: var(--fg2);
            line-height: 1.5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .search-empty {
            padding: 24px;
            text-align: center;
            font-family: var(--font-mono);
            color: var(--fg2);
            font-size: 0.82rem;
        }

        /* ── responsive ── */
        @media (max-width: 768px) {
            .hamburger { display: block; }

            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.25s;
                z-index: 99;
            }

            .sidebar.open { transform: translateX(0); }

            .main { margin-left: 0; }

            .article { padding: 24px 20px 60px; }
            .breadcrumb { padding: 10px 20px; }
            .homepage { padding: 24px 20px; }
            .home-title { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<!-- topbar -->
<div class="topbar">
    <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <a href="/" class="site-name">So<span>phia</span></a>
    </div>
    <div class="topbar-right">
        <button class="search-trigger" onclick="openSearch()">
            ⌕ search <span class="kbd">ctrl k</span>
        </button>
    </div>
</div>

<!-- search -->
<div class="search-overlay" id="search-overlay" onclick="closeSearch()"></div>
<div class="search-modal" id="search-modal">
    <div class="search-input-wrap">
        <span class="search-icon-modal">⌕</span>
        <input type="text" class="search-input" id="search-input"
               placeholder="search all subjects..."
               autocomplete="off" spellcheck="false"
               oninput="doSearch()" onkeydown="searchNav(event)">
        <button class="search-close-btn" onclick="closeSearch()">esc</button>
    </div>
    <div class="search-results" id="search-results">
        <div class="search-empty">type to search all notes</div>
    </div>
</div>

<!-- layout -->
<div class="layout">
    <div class="sidebar" id="sidebar">
        NAV_PLACEHOLDER
    </div>
    <div class="main">
        <div class="breadcrumb">BREADCRUMB_PLACEHOLDER</div>
        <div class="article">
            CONTENT_PLACEHOLDER
        </div>
    </div>
</div>

<script>
// ── sidebar toggle ──
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}

// ── nav subject toggle ──
function toggleSubject(el) {
    const pages = el.nextElementSibling;
    pages.classList.toggle('collapsed');
}

// ── search ──
let searchIndex = null;

async function loadIndex() {
    if (searchIndex) return;
    try {
        const res = await fetch('/search-index.json');
        searchIndex = await res.json();
    } catch(e) { console.error('search index error', e); }
}

function openSearch() {
    document.getElementById('search-overlay').classList.add('open');
    document.getElementById('search-modal').classList.add('open');
    document.getElementById('search-input').focus();
    loadIndex();
}

function closeSearch() {
    document.getElementById('search-overlay').classList.remove('open');
    document.getElementById('search-modal').classList.remove('open');
    document.getElementById('search-input').value = '';
    document.getElementById('search-results').innerHTML = '<div class="search-empty">type to search all notes</div>';
    selectedIdx = -1;
}

let selectedIdx = -1;

function doSearch() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    const container = document.getElementById('search-results');
    selectedIdx = -1;

    if (!q || !searchIndex) {
        container.innerHTML = '<div class="search-empty">type to search all notes</div>';
        return;
    }

    const results = searchIndex.filter(e =>
        e.title.toLowerCase().includes(q) ||
        e.body.toLowerCase().includes(q) ||
        e.subject.toLowerCase().includes(q)
    ).slice(0, 10);

    if (!results.length) {
        container.innerHTML = '<div class="search-empty">no results found</div>';
        return;
    }

    container.innerHTML = results.map((r, i) => `
        <a href="${r.url}" class="search-result" data-idx="${i}">
            <div class="sr-top">
                <span class="sr-title">${r.title}</span>
                <span class="sr-subject">${r.subject}</span>
            </div>
            <div class="sr-snippet">${r.body.substring(0, 120)}...</div>
        </a>
    `).join('');
}

function searchNav(e) {
    const items = document.querySelectorAll('.search-result');
    if (e.key === 'ArrowDown') { e.preventDefault(); selectedIdx = Math.min(selectedIdx + 1, items.length - 1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); selectedIdx = Math.max(selectedIdx - 1, 0); }
    else if (e.key === 'Enter' && selectedIdx >= 0) { items[selectedIdx]?.click(); }
    else if (e.key === 'Escape') { closeSearch(); }
    items.forEach((item, i) => item.classList.toggle('selected', i === selectedIdx));
}

document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        document.getElementById('search-modal').classList.contains('open') ? closeSearch() : openSearch();
    }
});
</script>
</body>
</html>
