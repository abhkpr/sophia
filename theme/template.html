<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITLE_PLACEHOLDER — Sophia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
/* ── reset ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── variables ── */
:root {
    /* warm dark palette */
    --bg:          #13120f;
    --bg-2:        #1a1916;
    --bg-3:        #221f1b;
    --bg-4:        #2a2722;
    --border:      #332f28;
    --border-2:    #3d3830;

    /* text */
    --text:        #e8e0d0;
    --text-2:      #b8ad9a;
    --text-3:      #7a7165;
    --text-4:      #4a443c;

    /* accents */
    --blue:        #5b9bd5;
    --blue-dim:    #3d6e9e;
    --blue-glow:   rgba(91,155,213,0.12);
    --green:       #4ec994;
    --green-dim:   #2d8a62;
    --yellow:      #d4a72c;
    --red:         #e06c75;

    /* sidebar */
    --sidebar-w:   272px;

    /* typography */
    --font-body:   'Plus Jakarta Sans', sans-serif;
    --font-read:   'Literata', Georgia, serif;
    --font-mono:   'IBM Plex Mono', monospace;

    /* transitions */
    --trans:       0.2s ease;
    --trans-slow:  0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── base ── */
html { font-size: 16px; scroll-behavior: smooth; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
}

a { color: var(--blue); text-decoration: none; }
a:hover { color: var(--text); }

/* ── layout wrapper ── */
.app {
    display: flex;
    min-height: 100vh;
}

/* ══════════════════════════════════
   SIDEBAR
══════════════════════════════════ */
.sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--bg-2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: sticky;
    top: 0;
    overflow: hidden;
    transition: width var(--trans-slow), transform var(--trans-slow);
    z-index: 50;
}

/* collapsed state */
.sidebar.collapsed {
    width: 0;
    border-right-color: transparent;
}

/* ── sidebar header ── */
.sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    min-width: var(--sidebar-w);
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
}

.logo-mark {
    width: 28px;
    height: 28px;
    background: var(--blue);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--bg);
    letter-spacing: -0.5px;
    flex-shrink: 0;
}

.logo-name {
    font-family: var(--font-mono);
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.5px;
    white-space: nowrap;
}

.logo-name span { color: var(--blue); }

.sidebar-close {
    background: none;
    border: none;
    color: var(--text-3);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    font-size: 1rem;
    line-height: 1;
    transition: color var(--trans), background var(--trans);
    flex-shrink: 0;
}

.sidebar-close:hover {
    color: var(--text);
    background: var(--bg-3);
}

/* ── sidebar search ── */
.sidebar-search {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    min-width: var(--sidebar-w);
}

.search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    cursor: pointer;
    transition: border-color var(--trans), background var(--trans);
    width: 100%;
}

.search-box:hover {
    border-color: var(--border-2);
    background: var(--bg-4);
}

.search-icon { color: var(--text-3); font-size: 0.85rem; }

.search-placeholder {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text-3);
    flex: 1;
    text-align: left;
}

.search-kbd {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--text-4);
    background: var(--bg-4);
    border: 1px solid var(--border-2);
    border-radius: 3px;
    padding: 1px 5px;
}

/* ── sidebar nav ── */
.sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0 24px;
    min-width: var(--sidebar-w);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
}

.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-track { background: transparent; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* subject group */
.nav-group { margin-bottom: 4px; }

.nav-group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 16px 6px 20px;
    cursor: pointer;
    user-select: none;
    transition: background var(--trans);
    border-radius: 0;
}

.nav-group-header:hover { background: var(--bg-3); }

.nav-group-label {
    font-family: var(--font-mono);
    font-size: 0.67rem;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-3);
    transition: color var(--trans);
}

.nav-group.active .nav-group-label { color: var(--blue); }

.nav-group-arrow {
    color: var(--text-4);
    font-size: 0.6rem;
    transition: transform var(--trans), color var(--trans);
}

.nav-group.open .nav-group-arrow { transform: rotate(90deg); }
.nav-group.active .nav-group-arrow { color: var(--blue-dim); }

/* nav pages */
.nav-pages {
    overflow: hidden;
    max-height: 0;
    transition: max-height var(--trans-slow);
}

.nav-group.open .nav-pages { max-height: 600px; }
.nav-group.active .nav-pages { max-height: 600px; }

.nav-page {
    display: block;
    padding: 5px 16px 5px 32px;
    font-size: 0.82rem;
    color: var(--text-2);
    transition: color var(--trans), background var(--trans), border-color var(--trans);
    border-left: 2px solid transparent;
    margin-left: 18px;
    border-radius: 0 4px 4px 0;
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.nav-page:hover {
    color: var(--text);
    background: var(--bg-3);
    text-decoration: none;
}

.nav-page.active {
    color: var(--blue);
    border-left-color: var(--blue);
    background: var(--blue-glow);
}

/* ══════════════════════════════════
   MAIN AREA
══════════════════════════════════ */
.main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* ── topbar ── */
.topbar {
    position: sticky;
    top: 0;
    z-index: 40;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px;
    height: 52px;
    flex-shrink: 0;
}

.topbar-toggle {
    background: none;
    border: none;
    color: var(--text-3);
    cursor: pointer;
    padding: 6px;
    border-radius: 5px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: color var(--trans), background var(--trans);
    flex-shrink: 0;
}

.topbar-toggle:hover {
    color: var(--text);
    background: var(--bg-3);
}

.topbar-toggle span {
    display: block;
    width: 16px;
    height: 1.5px;
    background: currentColor;
    border-radius: 1px;
    transition: transform var(--trans), opacity var(--trans), width var(--trans);
}

/* breadcrumb */
.breadcrumb {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text-3);
    min-width: 0;
    overflow: hidden;
}

.breadcrumb a {
    color: var(--text-3);
    text-decoration: none;
    transition: color var(--trans);
    white-space: nowrap;
}

.breadcrumb a:hover { color: var(--blue); }

.breadcrumb-sep { color: var(--text-4); }

.breadcrumb-current {
    color: var(--text-2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
}

.topbar-search-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    color: var(--text-3);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: all var(--trans);
    white-space: nowrap;
}

.topbar-search-btn:hover {
    border-color: var(--blue-dim);
    color: var(--text);
    background: var(--bg-4);
}

/* ── page content ── */
.page {
    flex: 1;
    display: flex;
    justify-content: center;
    padding: 0 24px 80px;
}

/* ── article ── */
.article {
    width: 100%;
    max-width: 760px;
    padding-top: 48px;
}

/* ── content typography ── */
.article h1 {
    font-family: var(--font-read);
    font-size: clamp(1.8rem, 4vw, 2.4rem);
    font-weight: 500;
    color: var(--text);
    line-height: 1.25;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
}

.article .page-meta {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text-3);
    margin-bottom: 40px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
}

.article .page-meta .tag {
    background: var(--bg-3);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 4px;
    color: var(--text-3);
}

.article h2 {
    font-family: var(--font-read);
    font-size: 1.45rem;
    font-weight: 500;
    color: var(--text);
    margin: 44px 0 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.2px;
    scroll-margin-top: 70px;
}

.article h3 {
    font-family: var(--font-body);
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    margin: 28px 0 12px;
    scroll-margin-top: 70px;
}

.article h4 {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--green);
    margin: 20px 0 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
}

.article p {
    font-family: var(--font-read);
    font-size: 1rem;
    color: var(--text-2);
    line-height: 1.85;
    margin-bottom: 18px;
}

.article strong {
    color: var(--text);
    font-weight: 600;
}

.article em {
    color: var(--text);
    font-style: italic;
}

.article a {
    color: var(--blue);
    border-bottom: 1px solid var(--blue-dim);
    transition: color var(--trans), border-color var(--trans);
    text-decoration: none;
}

.article a:hover {
    color: var(--text);
    border-color: var(--text);
    text-decoration: none;
}

/* code */
.article code {
    font-family: var(--font-mono);
    font-size: 0.84em;
    background: var(--bg-3);
    color: var(--green);
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
}

.article pre {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--blue-dim);
    border-radius: 0 6px 6px 0;
    padding: 20px 22px;
    overflow-x: auto;
    margin: 20px 0;
    position: relative;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
}

.article pre::-webkit-scrollbar { height: 4px; }
.article pre::-webkit-scrollbar-thumb { background: var(--border); }

.article pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--text-2);
    font-size: 0.875rem;
    line-height: 1.7;
}

/* lists */
.article ul, .article ol {
    padding-left: 28px;
    margin-bottom: 18px;
}

.article li {
    font-family: var(--font-read);
    color: var(--text-2);
    margin-bottom: 6px;
    line-height: 1.75;
}

.article li strong { color: var(--text); }

.article li > ul, .article li > ol { margin-top: 6px; margin-bottom: 6px; }

/* blockquote */
.article blockquote {
    border-left: 3px solid var(--yellow);
    background: rgba(212,167,44,0.05);
    padding: 14px 20px;
    margin: 20px 0;
    border-radius: 0 6px 6px 0;
}

.article blockquote p {
    color: var(--text-2);
    margin: 0;
    font-style: italic;
    font-size: 0.95rem;
}

/* table */
.article table {
    width: 100%;
    border-collapse: collapse;
    margin: 24px 0;
    font-size: 0.875rem;
    display: block;
    overflow-x: auto;
}

.article th {
    background: var(--bg-3);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 16px;
    text-align: left;
    border: 1px solid var(--border);
    white-space: nowrap;
}

.article td {
    padding: 9px 16px;
    border: 1px solid var(--border);
    color: var(--text-2);
    vertical-align: top;
    font-family: var(--font-read);
    line-height: 1.5;
}

.article tr:hover td { background: var(--bg-3); }

/* hr */
.article hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 36px 0;
}

/* images */
.article img {
    max-width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin: 16px 0;
    display: block;
}

/* ══════════════════════════════════
   HOMEPAGE
══════════════════════════════════ */
.homepage {
    width: 100%;
    max-width: 900px;
    padding-top: 56px;
}

.home-eyebrow {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--green);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
}

.home-title {
    font-family: var(--font-read);
    font-size: clamp(2.5rem, 7vw, 4rem);
    font-weight: 300;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 16px;
}

.home-title em {
    font-style: italic;
    color: var(--blue);
}

.home-desc {
    font-family: var(--font-read);
    font-size: 1.05rem;
    color: var(--text-2);
    line-height: 1.7;
    max-width: 520px;
    margin-bottom: 56px;
}

.home-divider {
    width: 40px;
    height: 1px;
    background: var(--border-2);
    margin-bottom: 40px;
}

.home-grid-label {
    font-family: var(--font-mono);
    font-size: 0.67rem;
    color: var(--text-3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
}

.subject-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
}

.subject-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    text-decoration: none;
    transition: all var(--trans);
    display: block;
    position: relative;
    overflow: hidden;
}

.subject-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--blue-dim);
    opacity: 0;
    transition: opacity var(--trans);
}

.subject-card:hover {
    border-color: var(--border-2);
    background: var(--bg-3);
    transform: translateY(-2px);
    text-decoration: none;
}

.subject-card:hover::before { opacity: 1; }

.card-icon {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--blue);
    letter-spacing: 2px;
    margin-bottom: 10px;
    opacity: 0.7;
}

.card-name {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.3;
}

.card-count {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--text-3);
    letter-spacing: 0.5px;
}

/* ══════════════════════════════════
   SEARCH MODAL
══════════════════════════════════ */
.search-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,9,8,0.8);
    backdrop-filter: blur(4px);
    z-index: 200;
    animation: fade-in 0.15s ease;
}

.search-overlay.open { display: block; }

@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

.search-modal {
    display: none;
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: min(640px, calc(100vw - 32px));
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    border-radius: 10px;
    z-index: 201;
    max-height: calc(100vh - 160px);
    flex-direction: column;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px var(--border);
    overflow: hidden;
    animation: modal-in 0.15s ease;
}

.search-modal.open { display: flex; }

@keyframes modal-in {
    from { opacity: 0; transform: translateX(-50%) translateY(-8px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.search-modal-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
}

.search-modal-icon { color: var(--text-3); font-size: 1rem; flex-shrink: 0; }

.search-modal-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: var(--font-body);
    font-size: 0.95rem;
    color: var(--text);
    caret-color: var(--blue);
}

.search-modal-input::placeholder { color: var(--text-3); }

.search-modal-esc {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    color: var(--text-4);
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    cursor: pointer;
    flex-shrink: 0;
}

.search-results {
    overflow-y: auto;
    max-height: calc(100vh - 280px);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
}

.search-empty {
    padding: 32px 18px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--text-3);
}

.search-result {
    display: block;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    transition: background var(--trans);
    cursor: pointer;
}

.search-result:last-child { border-bottom: none; }

.search-result:hover,
.search-result.selected {
    background: var(--bg-3);
    text-decoration: none;
}

.sr-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 3px;
}

.sr-title {
    font-family: var(--font-body);
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.sr-subject {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    color: var(--green);
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-shrink: 0;
}

.sr-snippet {
    font-size: 0.78rem;
    color: var(--text-3);
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.search-footer {
    padding: 8px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 16px;
    background: var(--bg-3);
}

.search-hint {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text-4);
    display: flex;
    align-items: center;
    gap: 5px;
}

.search-hint kbd {
    background: var(--bg-4);
    border: 1px solid var(--border-2);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 0.6rem;
}

/* ══════════════════════════════════
   OVERLAY (mobile sidebar)
══════════════════════════════════ */
.sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,9,8,0.6);
    z-index: 45;
}

.sidebar-overlay.open { display: block; }

/* ══════════════════════════════════
   RESPONSIVE
══════════════════════════════════ */

/* tablet and below */
@media (max-width: 900px) {
    .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        transform: translateX(0);
        width: var(--sidebar-w);
    }

    .sidebar.collapsed {
        transform: translateX(calc(-1 * var(--sidebar-w)));
        width: var(--sidebar-w);
    }

    .main { margin-left: 0; }

    .page { padding: 0 16px 80px; }

    .article { padding-top: 32px; }
    .homepage { padding-top: 36px; }
}

/* mobile */
@media (max-width: 540px) {
    :root { --sidebar-w: 100vw; }

    .topbar { padding: 0 16px; }
    .topbar-search-btn .search-kbd { display: none; }
    .topbar-search-btn span:first-child { display: none; }

    .article h1 { font-size: 1.6rem; }
    .home-title { font-size: 2.2rem; }

    .subject-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .subject-card { padding: 14px; }

    .article pre { padding: 14px 16px; }
    .article th, .article td { padding: 7px 10px; }

    .search-modal { top: 16px; }
}

/* large screen */
@media (min-width: 1400px) {
    .article { max-width: 800px; }
    .homepage { max-width: 1000px; }
    .page { padding: 0 48px 80px; }
}

/* ══════════════════════════════════
   SYNTAX HIGHLIGHT OVERRIDE
══════════════════════════════════ */
.sourceCode { background: transparent !important; }
div.sourceCode { margin: 0 !important; }
pre.sourceCode {
    background: var(--bg-2) !important;
    border: 1px solid var(--border) !important;
    border-left: 3px solid var(--blue-dim) !important;
    border-radius: 0 6px 6px 0 !important;
    padding: 18px 20px !important;
    overflow-x: auto !important;
}
code.sourceCode {
    font-family: var(--font-mono) !important;
    font-size: 0.875rem !important;
    line-height: 1.7 !important;
}

/* zenburn-style overrides for warm dark */
.kw { color: #7eb8da; }   /* keyword */
.dt { color: #df9f70; }   /* data type */
.dv { color: #d5c4a1; }   /* decimal value */
.st { color: #b8bb26; }   /* string */
.co { color: #7c6f64; font-style: italic; }  /* comment */
.fu { color: #8ec07c; }   /* function */
.op { color: #d4a72c; }   /* operator */
.cf { color: #fb4934; }   /* control flow */
.cn { color: #d3869b; }   /* constant */
.pp { color: #fabd2f; }   /* preprocessor */
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="app">

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <a href="/" class="logo">
            <div class="logo-mark">σ</div>
            <span class="logo-name">So<span>phia</span></span>
        </a>
        <button class="sidebar-close" onclick="closeSidebar()" title="close sidebar">✕</button>
    </div>

    <div class="sidebar-search">
        <button class="search-box" onclick="openSearch()">
            <span class="search-icon">⌕</span>
            <span class="search-placeholder">search...</span>
            <span class="search-kbd">⌘K</span>
        </button>
    </div>

    <nav class="sidebar-nav" id="sidebarNav">
        NAV_PLACEHOLDER
    </nav>
</aside>

<!-- ══ MAIN ══ -->
<div class="main">
    <header class="topbar">
        <button class="topbar-toggle" onclick="toggleSidebar()" title="toggle sidebar" id="topbarToggle">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div class="breadcrumb">
            BREADCRUMB_PLACEHOLDER
        </div>

        <div class="topbar-right">
            <button class="topbar-search-btn" onclick="openSearch()">
                <span>⌕</span>
                <span>search</span>
                <span class="search-kbd">Ctrl K</span>
            </button>
        </div>
    </header>

    <div class="page">
        CONTENT_PLACEHOLDER
    </div>
</div>

</div>

<!-- ══ SEARCH MODAL ══ -->
<div class="search-overlay" id="searchOverlay" onclick="closeSearch()"></div>
<div class="search-modal" id="searchModal">
    <div class="search-modal-header">
        <span class="search-modal-icon">⌕</span>
        <input
            type="text"
            class="search-modal-input"
            id="searchInput"
            placeholder="search all subjects..."
            autocomplete="off"
            spellcheck="false"
        >
        <button class="search-modal-esc" onclick="closeSearch()">esc</button>
    </div>
    <div class="search-results" id="searchResults">
        <div class="search-empty">start typing to search</div>
    </div>
    <div class="search-footer">
        <span class="search-hint"><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
        <span class="search-hint"><kbd>↵</kbd> open</span>
        <span class="search-hint"><kbd>esc</kbd> close</span>
    </div>
</div>

<script>
// ── sidebar ──
let sidebarOpen = window.innerWidth >= 900;

function openSidebar() {
    document.getElementById('sidebar').classList.remove('collapsed');
    if (window.innerWidth < 900)
        document.getElementById('sidebarOverlay').classList.add('open');
    sidebarOpen = true;
}

function closeSidebar() {
    document.getElementById('sidebar').classList.add('collapsed');
    document.getElementById('sidebarOverlay').classList.remove('open');
    sidebarOpen = false;
}

function toggleSidebar() {
    sidebarOpen ? closeSidebar() : openSidebar();
}

// init sidebar state
(function() {
    if (window.innerWidth < 900) {
        document.getElementById('sidebar').classList.add('collapsed');
        sidebarOpen = false;
    }
})();

// close on resize to large
window.addEventListener('resize', () => {
    if (window.innerWidth >= 900 && !sidebarOpen) {
        document.getElementById('sidebar').classList.remove('collapsed');
        document.getElementById('sidebarOverlay').classList.remove('open');
        sidebarOpen = true;
    }
});

// ── nav groups ──
function toggleGroup(header) {
    const group = header.parentElement;
    // don't collapse active group
    if (group.classList.contains('active')) return;
    group.classList.toggle('open');
}

// ── search ──
let searchIndex = null;
let selectedIdx = -1;

async function loadIndex() {
    if (searchIndex) return;
    try {
        searchIndex = await (await fetch('/search-index.json')).json();
    } catch(e) { console.error('search index error', e); }
}

function openSearch() {
    document.getElementById('searchOverlay').classList.add('open');
    document.getElementById('searchModal').classList.add('open');
    document.getElementById('searchInput').focus();
    loadIndex();
}

function closeSearch() {
    document.getElementById('searchOverlay').classList.remove('open');
    document.getElementById('searchModal').classList.remove('open');
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResults').innerHTML = '<div class="search-empty">start typing to search</div>';
    selectedIdx = -1;
}

function highlight(text, query) {
    if (!query) return text;
    const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return text.replace(re, '<mark style="background:rgba(91,155,213,0.25);color:var(--text);border-radius:2px">$1</mark>');
}

document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.trim();
    const container = document.getElementById('searchResults');
    selectedIdx = -1;

    if (!q || !searchIndex) {
        container.innerHTML = '<div class="search-empty">start typing to search</div>';
        return;
    }

    const ql = q.toLowerCase();
    const results = searchIndex
        .map(e => {
            let score = 0;
            if (e.title.toLowerCase().includes(ql)) score += 3;
            if (e.subject.toLowerCase().includes(ql)) score += 2;
            if (e.body.toLowerCase().includes(ql)) score += 1;
            return { ...e, score };
        })
        .filter(e => e.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 8);

    if (!results.length) {
        container.innerHTML = '<div class="search-empty">no results found</div>';
        return;
    }

    container.innerHTML = results.map((r, i) => {
        const snippet = r.body.length > 100 ? r.body.substring(0, 100) + '...' : r.body;
        return `<a href="${r.url}" class="search-result" data-idx="${i}">
            <div class="sr-row">
                <span class="sr-title">${highlight(r.title, q)}</span>
                <span class="sr-subject">${r.subject}</span>
            </div>
            <div class="sr-snippet">${snippet}</div>
        </a>`;
    }).join('');
});

document.getElementById('searchInput').addEventListener('keydown', function(e) {
    const items = document.querySelectorAll('.search-result');
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectedIdx = Math.min(selectedIdx + 1, items.length - 1);
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectedIdx = Math.max(selectedIdx - 1, 0);
    } else if (e.key === 'Enter' && selectedIdx >= 0) {
        items[selectedIdx]?.click();
        return;
    } else if (e.key === 'Escape') {
        closeSearch();
        return;
    }
    items.forEach((item, i) => item.classList.toggle('selected', i === selectedIdx));
    if (selectedIdx >= 0) items[selectedIdx]?.scrollIntoView({ block: 'nearest' });
});

// ctrl+k / cmd+k
document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        document.getElementById('searchModal').classList.contains('open') ? closeSearch() : openSearch();
    }
    if (e.key === 'Escape' && document.getElementById('searchModal').classList.contains('open')) {
        closeSearch();
    }
});
</script>
</body>
</html>
